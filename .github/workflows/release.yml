name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # Cấu hình Node 24 và các biến tối ưu nhất hiện nay
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PNPM_CACHE_FOLDER: .pnpm-store

jobs:
  # JOB 1: Xử lý giao diện Frontend song song
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - name: Install & Build Frontend
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          pnpm exec next build
      - name: Upload Frontend Dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: dist # Chỉnh lại thành dist hoặc .next tùy cấu hình của bạn
          if-no-files-found: error
          compression-level: 0

  # JOB 2: Đóng gói đa nền tảng
  release:
    needs: build-frontend
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin --verbose"
            target: "aarch64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: "--target x86_64-unknown-linux-gnu --verbose"
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc --verbose"
            target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      # Tải về kết quả build Frontend đã làm xong ở máy bên kia
      - name: Download Frontend Dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev pkg-config xdg-utils mold clang libfuse2
          echo "export RUSTFLAGS=\"-C link-arg=-fuse-ld=mold\"" >> $GITHUB_ENV

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "buglogin-release-cache"

      - name: Install dependencies (No Build Frontend)
        run: pnpm install --frozen-lockfile --ignore-scripts --prefer-offline # Bỏ qua script build vì đã có artifact rồi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          TARGET: ${{ matrix.target }}
          PROFILE: release
        with:
          projectPath: ./src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "BugLogin ${{ github.ref_name }}"
          releaseBody: "Bản phát hành tự động của BugLogin."
          releaseDraft: false
          prerelease: false
          # Quan trọng: Tắt chức năng build frontend bên trong tauri-action để dùng artifact
          args: ${{ matrix.args }}

      - name: Zip and Upload MacOS App (Anti-Gatekeeper)
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos/
          ditto -c -k --sequesterRsrc --keepParent BugLogin.app buglogin-runner-darwin-arm64-${VERSION}.zip
          gh release upload ${{ github.ref_name }} buglogin-runner-darwin-arm64-${VERSION}.zip --clobber
