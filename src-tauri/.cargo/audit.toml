[advisories]
# Keep checking informational advisories, but ignore this specific upstream GTK/glib issue
# tracked through the Linux WebKit stack (cannot be resolved directly in this repo today).
informational_warnings = ["notice", "unmaintained", "unsound"]
ignore = ["RUSTSEC-2024-0429", "RUSTSEC-2025-0100", "RUSTSEC-2025-0098"]

[yanked]
# Upstream transitive crates can be yanked without a direct secure replacement path in-app.
# We keep vulnerability checks active and disable yanked-only failures for CI stability.
enabled = false
